<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Perpustakaan Digital</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: Arial, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0f172a;
            color: #e2e8f0;
        }
        .card {
            width: min(90vw, 480px);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 16px;
            padding: 24px;
            background: rgba(15, 23, 42, 0.7);
            text-align: center;
        }
        h1 {
            margin: 0 0 12px;
            font-size: 1.2rem;
        }
        p {
            margin: 0;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Kamu sedang offline</h1>
        <p>Periksa koneksi internet lalu coba buka halaman lagi.</p>
    </main>
</body>
</html>
